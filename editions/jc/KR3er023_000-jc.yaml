body:
  text: 第一章辨證概述四時百病不出外感內傷外感者風寒暑濕燥火也內傷者喜怒憂思悲恐驚也外感六淫風有風寒風熱風濕風燥風火寒有寒濕寒久能化熱暑有陰暑有陽暑暑必夾濕濕有寒濕風濕濕熱有濕去而化燥者燥有外感有內傷有氣燥有血燥火有實火虛火上焦火中焦火下焦火五臟六腑之火暴病初起寒熱頭痛總名之曰風寒有汗者傷風多鼻塞無汗者感寒多骨節痛暑病初起陰暑夾濕者多胸痞吐瀉陽暑則壯熱大渴頭痛濕病因天時者初起身重發熱或有汗或無汗而足冷者多胸必悶口必膩而不渴間有渴欲飲水而噁心者濕因嗜茶酒而病者必舌膩而不欲飲小便少而或大便溏燥自外感者必咳嗽咽乾凜凜惡寒燥因內傷者必舌乾便燥易飢而不欲食有傷氣傷血之分也火證最多壯熱目赤口渴便秘煩躁脈洪數大須辨虛實暴病多實久病多虛暴病多寒久病多熱內傷七情驚喜皆傷心心跳不寐悲憂皆傷肺咳嗽汗多思慮皆傷脾食少倦怠無力便溏怒傷肝或腹脅脹痛或頭昏眩而火升恐傷腎或心跳遺精或腰痛脊痛又有勞倦內傷為不足飲食內傷為不足中之有餘又有勞力傷脾色欲傷腎皆屬內傷之證第二章六淫治法風寒治法風寒初起宜散羌活防風荊芥紫蘇豆豉秦艽桔梗咳加杏仁噁心加橘皮半夏胸悶加枳殼無汗加蔥白風熱治法風熱初起牛蒡薄荷連翹桔梗豆豉前胡桑葉茅根風濕治法風濕初起防風白朮茯苓豆卷羌活風燥治法風燥沙參貝母玉竹薄荷桑葉知母風火治法風火羚羊連翹山梔薄荷牛蒡蘆根甚則犀角石膏川連大黃各隨證而施之寒濕治法寒濕宜溫散必身重腿股痠痛此為雜病之寒濕非傷寒門中夾濕之證宜桂枝苡仁防己防風羌活獨活牛膝等傷寒另有專書仲景傷寒論柯韻伯注最詳所宜熟讀者也至於寒邪化熱種種治法亦在傷寒論中後人如劉河間熱病論近時葉天士溫熱論皆要讀之書暑病治法暑屬火暑必夾濕有因貪涼閉汗外則無汗惡寒暑兼外寒內則熱甚煩悶者宜香薷飲香薷飲扁豆厚朴各半斤香薷一斤為粗末每服三錢酒水煎服功能祛暑解表化濕和中和劑局方方為主有因食瓜果冷水內變寒濕者暑兼內冷腹痛吐瀉輕者霍香正氣散重者脈伏肢冷此即所謂陰暑也寒多宜理中湯欲飲水者宜五苓散暑熱治法暑熱甚煩躁多汗脈洪大宜白虎湯但熱不寒背微惡寒者白虎加桂枝湯暑濕治法暑濕胸痞嘔惡消暑丸為主醋炒半夏茯苓甘草是也仿此則二陳湯藿香正氣散等皆所宜用他如濕溫舌白膩噁心身疼足冷口渴不多飲而又煩躁者蒼朮白虎湯可選陰濕治法濕而兼寒者陰濕也在內證門中如舌白嘔惡身疼惡寒無汗宜蒼朮皮羌活半夏茯苓陳皮陽濕冶法濕而兼熱者為陽濕即濕熱病也如舌白噁心身熱有汗胸痞宜豆卷杏仁半夏茯苓滑石等如嘔惡胸痞有汗煩悶或大便泄者薑汁炒川連半夏黃芩蔻仁枳實竹茹即瀉心溫膽法也風濕治法風濕乃濕病而兼風邪者並非外科與瘋科門之風濕也必惡風身重如王海藏神朮散王海藏神朮散又名神術湯蒼朮二兩防風二兩甘草一兩為粗末加生薑蔥白水煎服治內傷冷飲外感寒邪而無汗者陰症略例方之例無汗用蒼朮防風羌活有汗用白朮防風茯苓等濕化燥治法濕化燥宜清潤之中兼滲濕如局方甘露飲二地二冬茵陳澤瀉河間甘露飲五苓五苓五苓散之簡稱三石三石滑石石膏寒水石子和甘露飲於河間方中再加葛根藿香木香隨證採取內燥外燥治法內燥宜滋證必大便堅咽燥乾咳心跳如二地二冬玉竹石斛外燥宜清咳嗽胸中膹郁喻嘉言清燥救肺湯重者加人參大便不燥結者去麻仁而加川貝氣燥血燥治法氣分燥宜石膏連翹桔梗甘草血分燥如生地當歸桃仁玄參然氣燥血必燥清氣藥中略加花粉知母血燥氣亦燥滋燥藥中可入蘆根石斛實火虛火治法實火宜苦寒黃芩黃連黃柏山梔甚則大黃虛火宜甘寒鮮地鮮斛鮮沙參玄參麥冬雪梨汁甘蔗漿三焦火五臟六腑火治法上焦火黃芩桑皮甘草甚則石膏中焦火黃連甘草下焦火川柏知母肺火黃芩麥冬心火犀角川連甘草肝火羚羊山梔膽草青黛脾火黃連防風山梔腎火知母黃柏大腸火條芩槐花小腸火木通鮮生地膽火龍膽草苦參豬膽汁心胞火犀角連翹犀黃犀黃犀牛黃之簡稱即牛黃膀胱火黃柏車前子三焦火山梔為主其餘即上中下三焦之法也第三章七情治法驚喜傷心心跳不寐茯神棗仁硃砂金箔悲憂傷肺咳嗽汗多黃耆五味沙參麥冬思慮傷脾食少倦怠或便溏歸脾湯為主怒傷肝腹脅脹痛宜疏肝如香附蘇梗吳萸烏藥青皮陳皮肝火肝風上升頭眩火升者宜鎮肝熄風如石決明刺蒺藜天麻鉤藤虛者加沙苑女貞生地牡蠣恐傷腎心跳遺精腰痛脊痛如二地龜板杜仲狗脊或加磁石牡蠣第四章勞倦飲食色欲傷勞倦內傷勞倦內傷為不足其證凜凜微惡寒又微微內熱稍行動則氣短不足以息四肢倦怠無力宜東垣補中益氣湯參耆草升柴為要藥血加當歸氣加陳皮食不易運加神麯飲食傷飲食傷為有餘脘脹不舒或吞酸噯腐反飽不思食古法以香砂枳朮丸為主今時以二陳湯加神麯山楂砂仁枳實色欲傷色欲傷腎為下虛如二地杞子萸肉沙苑菟絲古以六味丸為主方第五章郁證痰病外感內傷已言大略又有郁證痰病亦須講及郁證郁證乃七情雜沓沓繁多難分經絡如倦怠太息或飢而不欲食或食即飽脹或心跳頭昏或腰痠足軟或火升內熱即在一日之中時覺暫快時覺昏沉懶於言動婦人患此最多每每經事不調腹中時痛古方治法雖詳總以暢懷為要治法如略有寒熱尚未大虛者逍遙散倦怠少寐者歸脾湯心跳口乾內熱者天王補心丹兩足跟痛腰膝痠痛目花頭眩者六味地黃湯經不調而腹痛者婦寶丹即四物加阿膠香附艾葉等味也痰病痰病多怪周身無處不患或喘咳多痰舌苔厚膩或舌紅口碎頭目昏重或經脈惕惕跳動或如昧如狂或嘔噦不眠或頸項腿臂結核痠疼治痰方法總以二陳湯為主老痰加南星枳實即導痰湯頑痰不愈礞石滾痰丸如瓜蔞仁海蛤粉白芥子風化硝竹瀝薑汁蘿蔔汁皆痰病可採之藥至於夾火夾寒夾氣夾郁夾食夾風夾濕即於寒濕風火氣鬱傷食門中諸藥採取一二味並用之可也第六章溫病吾吳為卑濕之地病真傷寒者絕少所看時證雖曰傷寒其實皆溫熱風溫濕溫之病近見淮上人吳鞠通溫病條辨言之甚詳宜讀之溫病治法溫病初起即在陽明雖一日惡寒至二日即但熱故開始即以梔豉湯加牛蒡薄荷橘皮桔梗杏仁等味夾食加枳實山楂二三日不大便加瓜蔞仁三四日熱重口渴加連翹蘆茅根五六日即憒憒神昏者其證必重加羚犀石菖蒲天竺黃之類若舌焦黃脘腹硬痛大便不通用涼膈散下之甚則承氣湯風溫治法溫邪夾風者必咳嗽頭痛微寒發熱如前胡杏仁桔梗牛蒡薄荷荊芥橘紅枳殼及其化火與上溫熱同治濕溫治法濕溫必胸痞舌苔厚而白膩淡豉橘紅半夏赤苓滑石無汗加葛根溫熱風溫濕溫化火治法溫熱風溫濕溫大便泄者此為熱泄葛根黃芩黃連湯嘔惡者橘皮竹茹湯煩躁透斑疹牛蒡犀尖犀尖犀角尖的簡稱連翹竺黃豆豉鮮地二味同研名黑膏若至譫語舌尖紅中心苔白或燥此邪自衛傳營如犀角鮮地赤芍連翹丹皮菖蒲鬱金山梔天竺黃等閉用萬氏牛黃清心丸開之開之不應至寶丹或珠珀犀黃散有譫語舌焦黑不知人大劑犀羚鮮地鮮斛川連連翹菖蒲蘆根送下紫雪丹五分或有開而得生者然究竟危極矣時證嘔惡用苦辛不效轉用輕清芳香法溫病中間或病後嘔惡煩悶不得寐瀉心湯合溫膽湯最妙如用苦泄之藥不靈乃胃虛不勝藥味之苦劣也與七葉飲甚輕靈如鮮藿香鮮佩蘭葉竹茹冬瓜子鮮荷葉鮮稻葉鮮薄荷葉枇杷葉此輕清芳香法余嘗用之見效溫病後調理凡溫病後調理總以甘涼養胃清徹餘邪為主按溫病後治在胃喻嘉言法也如豆卷炒黃川貝茯苓扁豆丹皮穀芽橘皮等溫邪兼感暴寒前言溫邪初起即在陽明此其常也然亦有暴寒引動溫邪者亦見太陽表證如頭項強痛周身疼惡寒甚而無汗者亦用羌活防風蔥白豆豉秦艽荊芥等溫散之但不用麻桂耳溫疫又時證溫疫沿門闔境其病相似者是也吳又可先生以達原飲為開手要方其證舌苔滿白但熱不寒方中厚朴檳榔為闢瘴之藥芩知為退熱之藥芍草為和中之藥獨草果一味究嫌辛烈余常去而不用即芍草二味雖曰和平而一嫌其斂一嫌其滯不若橘苓半夏之和中理氣化濁之為當也變用承氣法溫疫論中用大黃極言神妙無比後人不善用而強效顰誤事亦多惟疫證誤下之害小傷寒誤下之害大蓋以疫多火耳溫疫論云人方食肉而適得病雖下之而食不下必加人參於下藥之中其積始行此蓋助其胃氣以敷布流行即又可先生聰明善用大黃處也曾見吳濟亨吳濟亨王旭高同代名醫生平不詳治一年高人食牛肉脹滿不消諸藥不效先用人參六君子湯一劑而後消而下之即又可先生之意將一方而為二法也變用白虎法吳又可用白虎加人參湯與仲景法不同仲景云傷寒脈浮發熱無汗其表不解者不可與白虎湯而溫疫論中有脈浮發熱無汗者與白虎加人參湯氣化津回則汗從表達蓋傷寒之邪自表傳裡而化熱其外已解故必大煩大渴大熱大汗脈洪大者用白虎則金清而火退若溫邪時疫其熱自里達表脈本但數而不浮脈浮則其邪欲從表出故溫疫脈浮發熱無汗與白虎人參湯反汗出而解此亦又可善用古方之處也余所編溫疫論歌括及溫疫明辨歌訣言簡而意到所宜熟讀者也第七章中風中風一證多系肝風上逆卒然昏僕口歪流涎手足不遂古來方法治各不同有言風從外入者以小續命湯加減有言風自內生者宜熄內風或夾氣夾火夾痰前人之論備矣景岳直指為非風全由精氣內虛惟進溫補此亦一說不可不知不可全恃余每以羚羊天麻橘紅半夏鉤藤茯神竺黃竹瀝薑汁等中於氣而不語者送下蘇合香丸熱阻竅閉舌強神糊者化下至丹寶痰多加膽星至於口開為心絕手撒為脾絕眼閉為肝絕遺尿為腎絕鼾睡為肺絕汗出如油面赤如妝髮直息鼾目上視皆不治近世有迴天再造丸迴天再造丸一枝軒經驗方方其方補氣養血活血豁痰清火通絡搜風無所不備此丹藥亦未可專恃也他如地黃飲子三生飲加人參十味溫膽湯景岳之右歸左歸丸皆可採擇隨證施之第八章勞損勞瘵一門其來有漸而因各不同大抵咳嗽發熱不休大便溏者多不治其中心跳頭昏腰痛遺精白帶或吐血汗多往往兼夾為病圖治之方亦不一然總以肺脾腎三經為主如二地二冬參苓山藥丹皮川貝玉竹桑皮枇杷葉紅棗蓮子皆常用之藥吐血加茜草藕節心跳少寐棗仁辰砂便溏泄冬朮腹中痛白芍甘草腰痛杜仲狗脊帶下遺精沙苑子牡蠣頭痛火升石決明皆可隨證而加至於古方逍遙散歸脾湯補中益氣湯固本丸固本丸張氏醫通方天冬麥冬生地熟地各八兩人參四兩蜜丸每服四錢治老人津血俱虧咳逆便秘大補陰丸六味丸天王補心丹補肺阿膠散紫菀湯小建中湯地骨皮飲皆當引用第九章臌脹臌證有氣血痰水寒熱之分初起但腹脹而腹未滿者謂之脹若腹已滿者謂之脹滿若但腹脹滿者謂之臌脹若但腹脹而四肢面容消瘦謂之單腹脹若初起腹脹滿四肢面目悉腫者謂之腫脹脘腹痞脹多因氣滯每用理氣之藥如川樸青皮陳皮香附之類每兼濕濁必參燥濕之品如蒼朮半夏赤苓之屬挾熱者為濕熱加薑汁炒川連黃芩之類挾寒者加乾薑吳萸大抵觀其舌苔濁厚者因乎濕濁為多熱者口渴小溲赤寒者口不渴小便清食入脹痛或噯腐氣必兼食積宜加枳實萊菔子砂仁至如冬瓜皮大腹皮姜皮澤瀉等證尚未虛者皆可通用即正氣已虛兼補藥數味而冬瓜皮等仍可用之為佐使以化濕通氣也風水初起先面腫咳嗽而後腹脹足腫者古人謂之風水俗名水臌如兼寒熱頭脹痛鼻塞宜先發汗重則麻黃杏仁射干葶藶輕則羌防紫蘇桔梗如小便短少者必兼滲濕如苓澤苡仁木通車前通草等味水臌初起先足腫而後腹滿面浮者濕傷於下下甚極而上也此真水臌宜健脾運濕如五皮飲五苓散平胃散等選用之氣臌初起先腹脹而後面足腫者氣壅極而水注也先面足腫而後腹脹者水上逆而氣壅也然氣至水必注水注氣亦至故必以理氣行水為要也凡利水之藥必少佐通陽之屬如桂枝肉桂乾薑附子或加數分或用一味或二三味觀其證而酌用之可也單腹脹若單單腹脹滿手足反消瘦者多由鬱怒傷肝木來剋土精神內虧氣血不足雖有治法百難愈一若腹上青筋綻露食少便泄氣急不得臥者死期近矣用方如逍遙散兼六味丸六君子之意不宜大溫不可太寒當和平以守之臌脹日久脾腎兩虛者如理中湯腎氣丸善於調理亦有收功者然斷不能速效宜耐心服藥乃可凡腫脹忌食鹹宜食淡蓋以咸傷血而淡能滲濕也血臌此外有血臌婦女犯之為多男亦有之面色萎黃有蟹爪紋步履如常腹漸日大必多怒善忘口燥便秘胸悶脅痛宜六君子加芎歸乾薑延胡或暫入大黃酒炒一二劑蓋血瘀必因氣滯脾失健運故必運脾理氣之中而加血藥若但通瘀致虛其氣而脾愈弱反速其害多矣第十章噎膈反胃食不得下哽噎而下謂之噎食雖入咽仍復吐出謂之膈朝食暮吐名反胃噎宜清火降氣化痰如蔗漿梨汁薑汁杏仁川貝蘇子枇杷葉蘆根汁或加旋覆花蛤殼等膈膈證雖有寒有熱寒者多而熱者少如左金丸六君子加乾薑又津液枯者如蓯蓉杞子當歸半夏沉香茯苓甘草惟金匱大半夏湯用人參半夏白蜜以水揚之萬遍煎藥最妙反胃反胃宜溫朝食暮吐是無火也吐帶酸水者宜溫中焦如人參白朮乾薑川椒吳萸甚則附子吐出白沫者宜溫下焦如附子肉桂吳萸乾薑當歸蓯蓉川楝子至於噎膈夾痰夾瘀夾蟲者如桃仁新絳南星半夏瓦楞子及烏梅丸之意亦可參入附方牛犬二灰散治噎膈之奇方也不拘黃牛水牛但遇有狗屎於牛屎上者二屎共取和勻候乾封固每用煅灰存性陳酒調服三錢後用真雲南圍棋子一枚男用白女用黑搗研極細末仍以陳酒燉濃服之甘蔗飯甘蔗去皮切錢樣白米少些放磁碗內以水潤透米將蔗錢放米內再用磁碗蓋定慢火蒸熟成飯先取蔗錢與病人徐徐嚼咽蔗汁即食此飯為開膈第一方服後即食雲南黑白棋子末亦可反胃方此斗門方出綱目上取大附子一枚以溫湯泡去鹽味放於磚上四面著火漸逼脆焠入生薑自然汁中再逼再焠約盡薑汁半碗為度然後將附子研極細末用米湯調服一錢不過三服效第十一章痰飲痰飲為病心悸頭眩短氣而咳舌苔白者多柯韻伯云痰與飲同源而有陰陽之別陽盛陰虛則水氣凝而為痰陰盛陽虛則水氣溢而為飲然痰有寒痰飲亦有熱飲又不可不辨也痰飲諸方以二陳為主余則隨證加減久嗽氣短加桂枝白朮即合苓桂朮甘湯法也脅痛口不渴加白芥子旋覆花四肢腫身體疼重加黃耆防己即防己黃耆湯法咳逆倚息不得臥面色黑心下痞加防己桂枝人參風化硝即木防己法又小青龍湯葶藶大棗湯選用眩暈加澤瀉白朮咳嗽不已加乾薑細辛五味子以上必口不渴苔白火痰加海蛤粉瓜蔞霜黃芩浮石寒痰加乾薑附子風痰加南星天麻竹瀝薑汁燥痰加天冬麥冬玉竹瓜蔞連翹濕痰加蒼朮白朮虛痰加人參都氣丸腎氣丸金水六君煎食痰加枳實萊菔子郁痰加川貝川芎香附連翹實熱老痰礞石滾痰丸咳嗽臂痛脈沉指迷茯苓丸第十二章咳嗽古人云五臟六腑皆有咳總不離乎肺以余驗之外感風寒內傷精氣皆能致咳總不離乎痰飲以痰飲為致咳之根也惟虛實二字最宜分別不可誤也外感咳外感風寒暴咳必鼻塞頭痛惡寒發熱用前胡紫蘇杏仁橘紅桔梗象貝款冬花桑葉荊芥內傷咳內傷精氣久咳倦怠微熱咽乾肺陰雖虧而脾腎未傷者如沙參麥冬杏仁川貝玉竹桑皮枇杷葉以上兩種若苔白口膩者必加半夏茯苓澤瀉肺虛咳若久咳肺虛傷及脾胃者必食少便溏宜六君子加杏仁川貝冬花麥冬五味等腎虛咳若肺腎交虛必氣逆短促陰虛必痰中帶血宜生地阿膠白芍茜草炭水飲必舌白麵浮宜人參附子茯苓乾薑半夏白朮白芍五味甚則黑錫丹以鎮之咳嗽氣急咳嗽氣急當以蘇子降氣湯為主水飲咳喘水飲浮腫咳喘者葶藶大棗瀉肺湯加麻黃杏仁射干半夏沉香茯苓澤瀉等味哮喘哮喘以定喘湯為主只能見效難許斷根第十三章血證一切血證屬熱者多屬寒者少然亦有寒而宜溫者不可不知不可不辨血證除感風熱一條外風熱必身熱余俱不宜發熱若發熱脈洪大不休者難治外感吐血外感吐血先見頭痛惡寒發熱必取微汗宜紫蘇荊芥薄荷桑葉前胡黑梔丹皮赤芍茅根夏秋感暑熱秋燥吐血宜六一散石膏枇杷葉桑白皮丹皮炭茅根沙參阿膠等若大吐者四生丸四生丸婦人良方方生荷葉生艾葉生柏葉生地黃各等分水丸每服三錢治血熱妄行吐血衄血或犀角地黃湯瘀傷吐血瘀傷吐血必先胸脅痛其血必紫黑成塊脈必滯澀宜四物湯加醋炒大黃桃仁丹皮香附童便如紫血盡鮮血見用六君子加當歸調之溫邪吐衄溫熱病後因未發汗內熱蓄血而致吐衄大便黑面色黃宜犀角地黃湯加黑梔茅根內傷吐血血證除瘀傷及外感其餘皆屬七情飢飽勞碌等因必見噁心此內傷心脾失血的證高鼓峰心法以一味固元湯主之用人參耆歸芍草薑棗水煎服余以為初見吐血必先用寒涼涼藥不能止或雖稍止而終莫能除者治當補以甘溫若開手便溫適足以招謗亦非自全之道也楊仁齋楊仁齋楊士瀛字登父號仁齋南宋醫家謂陽虛陰必走大吐大衄外有寒冷之狀可用理中湯乾薑須炮黑加扁豆茯苓五味等余用此法曾驗過兼陰虛加熟地或保元湯當歸補血湯皆可選用血證有虛火不宜用炮薑肉桂剛燥之藥若見煩渴燥熱睡臥不安宜聖愈湯即四物湯加參耆或再加入麥冬五味衝入童便服之舌衄舌上出血如針孔射出者內服清心降火藥外以香薷湯含嗽再以槐花蒲黃炭研末摻之牙衄牙縫出血用生竹茹二兩醋浸一宿含之或以醋浸竹茹少許蘸乾蟾酥少許按於出血處立止滿口齒出血新鮮地骨皮四兩煎湯漱口服之亦可鼻血鼻血用生茅花一兩煎湯服如血不止用好陳酒五六斤燉溫浸兩足甚驗以上舌牙口鼻血出統用甘露飲犀角地黃湯血淋尿血小便下血痛者為血淋不痛為尿血用小薊飲子或新鮮苧麻根一兩煎湯服又海螵蛸鮮生地赤苓側柏葉車前子煎湯調亂髮灰加麝香少許同服或醋調亦可如痛不可忍以藕汁蘿蔔汁白蜜調下房勞尿血房勞傷小便尿血用鹿角膠五錢沒藥二錢血餘炭二錢為末茅根汁打麵糊丸每服二三錢淡鹽湯下便血大便血先便後血為遠血宜黃土湯熟地白朮炙草附子阿膠黃芩灶心土先血後便為近血宜清當歸赤小豆湯加槐花地榆側柏葉荊芥炭大便下血諸藥不效者宜烏梅地榆等澀之汗血皮膚血汗六味地黃湯加五味麥冬川斷又用煅人中白加麝香少許溫酒調下即效諸竅出血宜血餘炭棕炭蓮房炭為末服之血崩血崩宜歸脾湯為主加醋炒黃芩若血去過多加炮薑炭若汗出不止防其厥脫用當歸黃耆補血湯手足冷者加附子大吐大衄大崩之後血若稍止急用獨參湯第十四章心腹痛心不可痛皆胃脘痛耳氣痛氣痛脈沉澀宜四七湯血痛血痛痛如刀刺或大便黑宜失笑散生蒲黃五靈脂是也痰痛痰痛脈滑咳嗽或痛連脅下用二陳湯為主加瓜蔞白芥子等甚則礞石滾痰丸火痛火痛脈數實口渴面赤身熱便秘其痛或作或止宜金鈴子延胡薑汁炒川連炒吳萸黑山梔半夏茯苓淡芩等味冷痛冷痛脈遲細手足冷其痛綿綿不休宜附子理中湯加當歸肉桂吳萸虛痛虛痛心下悸而痛脈虛細澀喜按得食少安二便清利宜歸脾湯加石菖蒲或當歸肉桂建中湯或黃耆建中湯加吳萸川椒注痛注痛者感陰氣或異氣而痛語言錯亂其脈乍大乍小兩手之脈若出兩人宜平胃散加藿香石菖蒲麝香少許或送下蘇合香丸以辟邪魅陰氣蟲痛蟲痛脈平其痛忽來忽去聞肥甘之味更痛按摩少止唇紅舌上有白花點者宜附子理中湯加川連烏梅川椒黃柏肉桂當歸或烏梅丸食痛食痛脈實滑噯腐吞酸惡食腹脹其痛或有一條扛起宜平胃散加穀麥芽山楂半夏萊菔子如初起食在膈間即以指探吐之如腹脹滿拒按大便不通宜承氣湯加消導藥下之以上九痛流傳己久不可不知而高士宗高士宗高世拭字士宗清代醫家醫學真傳分各部用藥其法甚捷茲錄於下心包絡痛當心口而痛乃心包絡痛非真心痛也宜紫蘇細辛香附延胡陳皮甘草川桂枝木通當歸即香蘇飲合當歸四逆湯法也胸痹痛心之上胸膈痛即胸痹痛也宜瓜蔞川貝薤白肉豆蔻百合湯煎即百合烏梅二味胸膺痛胸膈下兩乳中間名胸膺也胸膺痛乃肝血內虛宜丹參當歸白芍紅花川斷檀香砂仁等即丹參飲加味也中脘痛胸膺之下即為中脘中脘痛手不可近寒痰積氣為多實者宜五積散虛者宜加味香蘇飲如紫蘇橘皮半夏吳萸桂枝當歸白芍香附木通甘草生薑等脘下痛中脘之下時痛時止乃中虛而胃氣不和若已服破氣消伐之藥便宜溫補但以手按之痛稍止者此中虛有寒之驗也宜香砂六君子湯加乾薑或合入黃耆建中湯乳下兩旁痛乳下兩旁胸骨盡處痛者乃少陽樞機不利也宜逍遙散加生薑大腹痛大腹者乃太陰脾土也如痛在內而緩中土虛寒也宜理中湯倍人參若痛兼內外而急脾絡不通也理中湯倍乾薑不應加肉桂臍旁痛臍旁左右痛者乃衝脈病也當用血分之藥若用氣藥無益也宜當歸四逆湯加吳茱萸生薑又四物湯去地黃加肉桂黃耆生薑甘草紅花臍中痛臍中痛不可忍喜按者腎氣虛寒也宜通脈四逆湯加白芍若脈沉實口渴腹滿便秘是有燥矢宜承氣下之臍下痛臍下寒痛乃腎陽虛而陰寒凝結宜真武湯或桂枝茯苓湯又有火痛者必小便不利或小便點滴脹痛宜五苓散送下通關丸大便不通者宜下之少腹痛少腹兩旁屬厥陰肝部實者宜香蘇飲加歸芍柴胡橘葉虛者宜烏梅丸法兩脅上痛兩脅之上痛者少陽不和也宜小柴胡湯加青皮合左金丸季脅痛兩旁季脅痛者屬肝氣虛也當歸四逆湯加阿膠杞子烏藥或四君子去白朮加當歸粳米送下烏梅丸一屬肝血虛一屬肝氣虛又按心腹諸痛如口中熱腹脹大便秘者或兼發熱者宜厚朴七物湯腹兼脅痛惡寒大便秘宜大黃附子湯若但脹而便不秘者是實中之虛宜厚朴生薑半夏人參甘草湯腹痛甚而手不可觸近嘔吐涎水宜大建中湯腹中雷鳴切痛嘔吐者附子粳米湯腹痛下利四肢厥逆者通脈四逆湯腹痛吐瀉者理中湯繞臍痛名寒疝當歸生薑羊肉湯皆出金匱第十五章痛風痹腰痛痛風痛風肢節走痛也不外風寒濕三氣所致痛風頭痛惡寒發熱者宜溫散如五積散五積散白芷川芎甘草茯苓當歸肉桂白芍半夏各三兩橘皮枳殼麻黃各六兩蒼朮二十四兩乾薑四兩桔梗十二兩厚朴四兩為粗末每服三錢加姜煎服功能解表散寒溫中消積太平惠民和劑局方方之類輕者宜防風當歸秦艽羌活獨活桂枝片薑黃牛膝川斷桑枝痛而夜重者屬血分四物湯加黃耆防風桂枝秦艽紅花桑枝炙草如痛久不愈宜大補氣血十全大補湯加虎骨桑寄生附子防風薑汁竹瀝溫補不效者邪入經絡也方中加金銀藤木通紅花鉤藤刺蒺藜羚羊角又久痛則鬱鬱則生熱熱則生痰必加制南星半夏瓜蔞根黃柏貝母竹瀝薑汁或桑寄生虎骨久服辛溫藥不效宜玉竹黑芝麻黃耆甘草阿膠蒺藜甘菊歸鬚姜蠶乃柔肝熄風也痹痹證與痛風相似痹則著而不行風則走痛無定內經云風勝為行痹即痛風也寒勝為痛痹濕勝為著痹是則痹證屬寒濕也治法不外溫通以祛寒濕宜五積散黃耆桂枝五物湯腰痛暴痛實者宜溫散如羌活秦艽桂枝白朮杜仲當歸乾薑茯苓防風腰久痛虛者宜補腎六味丸或八味丸加鹿角膠霜杜仲牛膝補骨脂瘀傷腰痛痛如刺輕者鹿角磨沖酒服重者桃仁承氣湯腰重痛者濕也苓薑朮桂湯陳修園陳修園陳念祖字修園清代醫家治腰痛久不愈用白朮一兩為主佐牛膝淫羊藿若火虛者加附子當歸肉桂杜仲或加乾薑治寒濕或加苡仁治濕者夾熱據云神效旭高治一腰痛其人咳嗽大便秘或時痛甚不可行動諸藥不效用滾痰丸而愈是痰亦有腰痛者第十六章癲狂癇癲者癡呆之狀哭笑無常語言無序其人常靜狂者罵詈不避親疏其人常動癇者卒倒無知口角流涎手足抽掣數刻即醒或數日或數月再發皆屬痰火脈實者吉沉細者凶用藥清火化痰實證滾痰丸當歸龍薈丸虛證磁朱丸桂枝龍骨牡蠣湯去桂加阿膠硃砂安神丸第十七章消渴消渴火證也脈宜數大忌虛小口渴不止為上消人參白虎湯食入即飢為中消調胃承氣湯飲一溲一為下消腎氣丸此古法也趙養葵趙養葵趙獻可字養葵明代醫家變其法用大劑六味湯料一斤加肉桂一兩五味子一兩煎湯六七碗冷飲之熟睡而渴如失喻嘉言用六味加犀角又豬肚丸豬肚丸濟生方方豬肚一個黃連炒小麥各五兩天花粉茯苓各四兩麥門冬二兩豬肚洗淨諸藥為末內肚中蒸之熟爛搗和為丸每服三錢亦可用第十八章傷食傷食證必見胸悶吞酸噯腐腹脹痛等證自宜以山楂神麯萊菔子檳榔枳實等若不噯腐胸滿但見頭痛惡寒發熱是外感證切不可使用消食藥反致表邪陷入切記切記脈滑而實者食積也病初起舌上苔厚而黃白色者必有食也第十九章黃疸黃疸濕熱鬱蒸而成有陰陽虛實邪正之分陽黃治法黃疸如小溲不利面目身膚如橘色紅黃者陽黃也宜茵陳山梔陳皮厚朴二苓澤瀉神麯麥芽口乾便秘者加黃芩黃連大黃陰黃治法若黃色淡白不華神倦口不渴腹微滿手足冷此為陰黃宜附子乾薑茵陳茯苓白朮厚朴等虛黃治法黃色淡小便清長四肢無力腹微滿不思食為虛黃宜黃耆建中湯表邪黃疸治法若初起頭痛發熱而後發黃者有表邪也用豆豉葛根柴胡黃芩連翹梔子杏仁滑石谷疸治法又有谷疸食谷則眩吞酸噯氣宜兼消導如枳實穀芽茯苓澤瀉神麯大腹皮等酒疸治法酒疸嗜酒傷濕所致分消藥中加葛花雞距子雞距子枳椇子黑疸治法黑疸額上黑面黃帶灰色此脾病傳腎也若腹滿者難治用乾薑附子澤瀉白朮亦有用杞子菟絲子等者若傷寒失下發黃神昏者不治第二十章瘧瘧疾寒熱往來有定候一日一發者邪淺二日一發者邪深三日一發者邪更深先寒後熱者為順先熱後寒者為逆發於子後而至午退者為陽發於午後而至夜半退者為陰發於午前而至酉戌退者陽經連及陰經也但寒而無熱者為牝瘧但熱而無寒者為癉瘧因勞而發者為勞瘧因食而發者為食瘧更有鬼瘧瘴瘧總不離乎少陽一經以少陽為半表半裡邪踞其界入與陰爭則寒出與陽爭則熱偏陽者熱多偏陰則寒多陰陽俱病則寒熱等焉治方如清脾飲清脾飲青皮厚朴草果白朮柴胡黃芩製半夏茯苓炙甘草各五分加姜煎治妊婦瘧疾婦人良方方小柴胡湯治瘧初起之正法也初起熱甚無汗加紫蘇葉防風寒多者加桂枝重用老薑熱多者加知母貝母蘆根大渴大煩大熱加石膏麥冬竹葉癉瘧治法癉瘧以石膏知母粳米為正方先熱後微寒者亦同癉瘧例白虎加桂枝湯鬼瘧治法鬼瘧脈乍大乍小其人時清時渾不換金正氣散不換金正氣散厚朴藿香甘草半夏蒼朮橘皮各等分為粗末每服三錢加薑棗煎治濕濁內停兼有外感太平惠民和劑局方方勞瘧治法勞瘧小柴胡湯加瓜蔞根口渴甚去半夏或補中益氣湯食瘧治法食瘧平胃散及柴胡久瘧三陰瘧治法久瘧及三陰瘧日久諸藥不效用白朮一二兩生薑五六錢水煎一杯寅時服之渣至午後再煎服如熱多者以當歸一兩代白朮三陽瘧治少陽膽三陰瘧治太陰脾胎瘧治法胎瘧久不愈用六君子湯加草果烏梅合小柴胡湯久瘧不愈亦用六君子湯補中益氣湯兼送服附桂八味丸三錢服之自效凡一切瘧疾欲急於取效之法三發之後以小柴胡湯加常山三錢寅時服渣再煎辰時再服如吐任其吐去痰涎自愈第二十一章痢疾痢疾初起多由暑濕積滯而成亦有夾寒夾表邪者如無外感表症但見裡急後重便膿血三四日內照倪涵初倪涵初倪宗賢字涵初清代醫家痢疾三方如芩連芍樸檳楂麥枳之類用無不效痢疾腹中痛或下血片及噤口噁心諸藥不效用斗門秘書斗門秘方即斗門方撰人不詳本草綱目中載之如乾薑黑豆炙粟殼地榆甘草白芍痢疾不論新久新痢以陳倉米湯送下香連丸二錢一日二三服至於久痢用四君六君或補中益氣湯或十全大補湯煎湯送下香連丸此薛立齋薛立齋薛己字新甫號立齋明代醫家法也痢疾諸藥不效脫肛身無熱而虛者真人養臟湯如粟殼肉豆蔻當歸肉桂木香人參等味休息久痢流連不愈宜黃連三錢血餘炭三錢烏梅肉三錢羊脂四錢白臘三錢白蜜八錢以羊脂白臘烊化為丸服之又陳松花陳松花陳久的松花粉火腿腳骨炙研末以黃臘烊化為丸亦效風泄下鮮血宜黃耆防風羌活葛根升麻等洞泄寒中食已即出完穀不化宜附子理中加川連烏梅又五更腎泄宜四神丸補骨脂吳萸肉果五味等是也脾泄宜理中為主湯丸如一皆可酌服痢疾忌款宜參脈沉小者易治脈浮大者難治發熱不止者死腹痛不休者死下痢純血者死下痢如屋漏水者死能食者輕不能食者重絕食下不止者死嘔呃者死新產即下痢者危治痢變通隨證用藥例以上是常用方法此則隨證變法下痢脈浮頭痛發熱葛根防風白芍甘草下痢發熱不休痢勢夜重者桂枝湯加當歸防風若發熱而肢冷者當歸四逆湯發熱下痢無汗者人參敗毒散加陳倉米名倉廩湯發熱惡寒初起下痢輕者以藿香正氣散不效者宜桂枝葛根湯甚則當歸四逆湯若寒熱往來作嘔者小柴胡湯若但熱不惡寒裡急後重者葛根芩連甘草若腹痛脹滿拒按口中燥渴舌苔焦黃此屬實熱宜承氣湯下之若口不渴脈遲細無力手足冷腹痛喜按此虛寒也宜理中四逆法溫之若腹痛不休虛煩飢不欲食為木剋土其脈必弦宜小建中湯服之不愈即以小柴胡湯去參加白芍用之效下痢血口渴裡急後重脈盛不虛為熱痢白頭翁湯虛體及產後加入阿膠甘草若下血而無火其血色必黯而成塊如此者則屬熱少而寒多也須辨其脈證如口不渴脈沉細手足冷小便清屬虛寒無疑以理中湯用灶心土煎湯代水下血多者黃土湯大生地阿膠白芍附子炮薑黃芩灶心黃土是也下痢初起不食舌苔濁膩脘腹硬痛平胃散加消導藥若脾胃已虛宜香砂六君子湯及理中湯不食亦宜細辨如不餓不欲食屬脾病宜理中六君若飢而不欲食屬肝病烏梅丸絕食而嘔噤口痢重證也朱丹溪朱丹溪朱震亨字彥修元代醫家因居浙江義烏之丹溪故人稱丹溪翁法用人參川連石蓮肉薑汁徐徐呷之若作惡濕熱上衝於胃葉天士葉天士葉桂字天士號香岩清代醫家用乾薑黃連瀉心湯若嘔吐涎沫者寒也宜吳茱萸湯心下痞滿亦宜瀉心湯及厚朴生薑半夏人參湯按治痢難於治瘧以痢為臟腑病瘧為經絡病也第二十二章頭痛耳聾凡感冒風寒必發熱惡寒而頭痛宜隨六經表證治之茲不具贅此雲頭痛乃雜病但頭痛無他證者大抵暫痛為邪久痛為虛邪則分寒熱而治之虛則分陰陽而補之然亦有久痛為邪所纏新病因虛而發者當察脈證而明辨之火頭痛火頭痛痛而煩熱或連齒痛脈洪數宜石膏竹葉薄荷黃芩茶葉等味又有鬱火頭痛宜逍遙散加葛根酒炒黃芩近時用羚羊角刺蒺藜天麻鉤鉤甘菊等更有痰火頭痛氣實有痰頭重眩暈用大黃酒炒三次為末清茶調服三錢又清空膏清空膏川芎五錢柴胡七錢黃連防風甘草羌活各一兩黃芩三兩五錢為細末每服一錢放熱酒內再入茶少許調如膏治偏正頭痛及雷頭風蘭室秘藏方亦治鬱火頭痛之聖方也偏頭痛偏頭痛多有痰火偏右者宜二陳湯加沙參芩連川芎防風膽星之類偏左者二陳加歸芍芎柴白芷之類氣虛頭痛氣虛頭痛煩勞則痛甚宜補中益氣湯加川芎蔓荊血虛頭痛血虛頭痛痛連眼稍角其目澀宜四物湯倍川芎加知柏蔓荊又當歸補血湯加鹿茸五錢另研沖水酒各半煎服眉稜骨痛眉稜骨痛用荊芥防風羌活白芷半夏沉香末等真頭痛真正頭痛痛連及腦手足寒冷至節死不治用黑錫丹腎虛頭痛腎虛頭痛宜六味丸加杞子甘草肉蓯蓉川芎細辛如命門火衰八味丸又熏法最效方用川芎五錢晚蠶沙二兩姜蠶如患者年歲之數如人年三十歲可用三十條毋多用以水五碗煎至三碗就砂鍋上以厚紙糊滿中間開錢大一孔取藥氣熏蒸痛處每日一次熏三五日見效耳聾暴聾肝火為多龍膽瀉肝湯當歸龍薈丸久聾腎虛也六味丸加菖蒲磁石牛膝五味再用磁朱丸又有耳中潰膿或流臭水屬肝火須外科另看第二十三章疝證疝有七種多屬肝經為病一曰寒疝睪丸冷硬而痛宜溫之如吳萸小茴川楝子胡蘆巴甚則肉桂附子一曰水疝囊腫出水宜萆薢茯苓半夏橘皮苡仁等一曰筋疝不在陰囊而在陰莖陰莖腫大或碎流膿水此屬濕火宜龍膽瀉肝湯近世名下疳不名筋疝筋疝之疝在胯凹有筋一條腫脹者是也一曰血疝即世俗夾癰魚口便毒之類在外科門一曰氣疝忿怒勞碌則囊腫而痛氣平則安宜烏藥木香吳萸山梔一曰狐疝臥則入少腹行立則出少腹而下注亦宜溫通一曰㿗疝囊大如斗不能全愈亦不害命陳修園七疝統治法以二陳湯為主加豬苓澤瀉白朮桂枝小茴香木通川楝子二陳加味外如寒甚者再加乾薑附子熱甚者加知柏小溺如膏者加菖蒲萆薢氣上衝者去白朮加肉桂吳萸當歸囊腫如水晶者加苡仁桑皮痛不可忍恐瘀血為膿致潰加桃仁紅花乳香筋疝加苡仁木瓜頑麻不痛者加川芎檳榔癢者加刺蒺藜又千金翼洗方雄黃末一兩生礬二兩甘草七錢水五碗煎二碗洗疝又於關元穴兩旁相去各三寸青脈上灸七壯左灸左右灸右又灸外陵穴在臍左右各開一寸半灸疝亦效第二十四章痿痿者兩足痿弱不能行也治宜補養氣血筋骨虎潛丸虎骨龜板熟地黃柏知母當歸牛膝鎖陽陳皮白芍羊肉為丸加減四斤丸蓯蓉牛膝木瓜鹿茸熟地五味菟絲杞子蜜丸痿證服前二丸若氣虛多痰者宜六君子湯加黃柏蒼朮紫菀紫菀治痿躄出神農本草經瘦黑人血虛多火六味丸加黃柏蒼朮肥白人痰多氣虛宜間服當歸補血湯加竹瀝薑汁第二十五章泄瀉內經云濕勝則濡泄宜胃苓湯統治之如蒼白朮二苓澤瀉川樸甘草桂枝陳皮等濕熱瀉口中熱溺赤下瀉腸垢為濕熱去桂加防風川連寒濕瀉溺清口和不渴下利清穀為寒濕加乾薑食積瀉胸滿痞悶噯腐吞酸瀉下臭穢為食積加山楂麥芽脾虛瀉食少便頻面色㿠白為脾虛去樸加人參乾薑腎虛瀉五更作瀉依時或臍下痛為腎虛去陳皮厚朴加附子四神丸吐瀉暴脫治法忽然大瀉不止大汗大喘手足厥冷兼吐者須防脾腎之氣暴脫夏月伏陰在內多此證宜附子理中湯大劑與之不可服香蕾藿香等暑熱瀉吸受暑濕作瀉宜六一散香連丸氣虛瀉氣虛下陷作瀉宜補中益氣湯去當歸加木香葛根飧泄飧泄又名水穀利指泄瀉完穀不化久風為飧泄宜神術湯聖濟附子湯痼冷久瀉止而又發瀉時腹痛諸藥不效此痼冷在腸間宜先取去然後調治許學士許學士許叔微字知可南宋醫家曾任集賢院學士故人稱許學士用溫脾湯千金用平胃散去蒼朮加乾薑肉桂附子木賊土痛瀉因土敗木賊宜痛瀉要方痛瀉要方陳皮芍防風白朮煎湯酌補土瀉木理肝脾若作食傷醫便錯久瀉久瀉諸藥不效者有臟熱腸寒腸熱臟寒之辨用烏梅丸二錢米飲下日三服半月愈又有久瀉用肉蓯蓉鹿角霜當歸鬚等法又有芩連甘葛有用阿膠羊脂乳酥黃連末蜂蜜熬膏等法喻嘉言喻嘉言喻昌字嘉言明末清初醫家頗得其旨第二十六章嘔吐噦呃聲與物俱出為嘔有物無聲為吐有聲無物為噦氣自上衝有聲聲短而頻名呃以上四證皆屬氣逆有統治法用二陳湯隨證加減如寒氣所客脈遲畏寒加乾薑藿香砂仁乾嘔吐涎沫加人參吳萸大棗倍生薑如食不得入屬火加芩連人參或飲食所傷吞酸噯腐加蒼朮藿香砂仁麥芽山楂神麯有聲無物即乾嘔加竹茹人參旋覆花赭石大棗吐酸水加吳萸川連脾胃虛弱運化遲而嘔吐者加人參冬朮砂仁木香食已即吐胃中有熱食入則兩熱相沖不得停留而吐若大便秘結可加大黃用蔗汁一杯薑汁一匙沖和服之效寒熱往來脅痛而嘔吐者屬少陽加人參柴胡黃芩大棗驟然發呃為胃火加石斛麥冬扁豆枇杷葉竹茹久病發呃有脾虛腎虛之分脾虛加參朮丁香柿蒂腎虛加參附乾薑沉香巴戟肉然此證多死如吐蟲者去甘草加川連川椒人參吳萸金鈴子烏梅粳米第二十七章積聚積者五臟所生推之不移屬陰聚者六腑所成推之則移屬陽當辨新久虛實而治積聚新病不虛宜五積散大實者用備急丸即大黃乾薑巴豆陰陽攻積丸即平胃散加萹蓄瞿麥麥芽川芎各五錢沉香木香各一錢五分大黃二兩酒浸為末每服三錢薑湯下忌油膩房事藥須黃昏時服勿食晚飯大小便見惡物為度下具加減法肝之積在左脅下名肥氣去蒼朮加柴胡鱉甲青皮莪朮肺之積在右脅下名息賁加白蔻桑皮鬱金心之積起臍上至心下大如臂名伏梁去蒼朮加肉桂黃連石菖蒲莪朮脾之積在胃脘腹大如盤名痞氣原方不加減腎之積在臍下發於少腹上衝心而痛名奔豚去蒼朮大黃陳皮麥芽萹蓄加茯苓四兩桂附當歸吳萸各五錢川楝子李根白皮李根白皮李樹的根皮各一兩蜜丸服四錢淡鹽湯下凡熱積加黃芩黃連寒積加薑桂附子酒積加葛花痰積加半夏水積加桑白皮赤小豆血積加桃仁紅花肉積加阿魏山楂果積加麝香草果如久病虛人不可逕用前藥或先服補藥而後攻之或攻藥去病之半而即補之或服攻藥二日進補藥一劑愈後必補脾胃收功如六君子湯附子理中湯此二方若臍下有動氣去白朮加肉桂若服攻藥大下積血自汗不止氣弱不能轉動急進參附湯救其脫貧人以當歸二錢黃耆八錢附子三錢代之第二十八章五淋癃閉文中沒有癃閉證治想系傳抄脫佚淋病小便滴瀝澀痛欲去不去欲止不止分為五種石淋下如砂石膏淋下如脂膏勞淋從勞役而得氣淋氣滯不通臍下悶痛血淋莖中刺痛出血皆屬熱結膀胱所致治三焦與膀胱正法五淋散五淋散用草梔仁歸芍茯苓與燈心清心滋腎如導赤散瀉肝龍膽瀉肝湯補腎知柏八味丸升清補中益氣湯分清泄濁固精萆薢分清飲第二十九章遺精夢而遺者相火熾也陳修園以封髓丹治之即砂仁黃柏甘草程鍾齡程鍾齡程國彭字鍾齡清代醫家以清心丸治之即生地丹參無夢而遺者心腎虛也金鎖固精丸肝心火盛者暫用龍膽瀉肝湯肝虛魂不藏守宜龍骨牡蠣龜板等肝熱膽寒宜溫膽湯加參茯神棗仁蓮肉痰火遺精威喜丸黃臘茯苓補益心脾四君加遠志若徒用補腎固澀無益也王荊公妙香散王荊公妙香散太平惠民和劑局方方麝香一錢煨木香二兩五錢山藥茯苓茯神黃耆遠志各一兩人參桔梗炙甘草各五錢硃砂三錢為末每服二錢溫酒調服治驚悸夢遺虛煩少眠治驚悸鬱結夢遺其方奇妙沈氏尊生書用黃連清心飲生地黃連當歸人參茯苓棗仁遠志建蓮肉亦大法中之穩法也第三十章赤白濁濁者小溲不清也屬濕熱初宜治脾滲濕熱久宜補腎固精如二陳湯加蒼朮黃柏萆薢赤色者再加丹參濁病稍久當固精兼滲濕萆薢分清飲中氣虛者補中益氣湯又有命門陽衰氣不攝精每致敗精為濁宜附桂八味丸加菟絲子車前子以導敗精濁出精竅與淋出溺竅不同病久宜固腎不宜分利是要旨也第三十一章自汗盜汗傷寒門以自汗為傷風盜汗為少陽雜病自汗屬陽虛盜汗屬陰虛陽虛自汗參耆朮附陰虛盜汗其人常發熱當歸六黃湯陰陽兩虛不寐煩躁歸脾湯加五味麥冬或人參養營湯自汗發熱為前此傷風醫不得法所致玉屏風散第三十二章怔忡驚悸不眠健忘奔豚怔忡驚悸不眠健忘治同怔忡血少也歸脾湯去木香加五味麥冬杞子吞都氣丸若因痰火必煩躁前方加生地川連川貝若水氣凌心者必舌白不渴宜半夏茯苓甘草桂枝大棗甚則真武湯以鎮之奔豚病氣從少腹上衝心而痛發作欲死肉桂茯苓為主藥有寒熱者李根白皮葛根當歸芍藥黃芩甘草吳萸第三十三章婦人門婦人之病與男子同惟經帶胎產另立方法胎前宜清產後宜溫胎前受胎二三月嘔惡者以陽明之氣壅盛於上也六君子湯加砂仁以和之半夏不必顧忌胎前下血名胎漏氣不攝血也補中益氣湯如惱怒傷肝加味逍遙散胎動不安血不養胎也四物湯去川芎加白朮杜仲有火者加黃芩有寒者加川椒此味今人罕用每易以炮姜墮胎證多屬氣血兩虛參耆歸芍菟絲杜仲冬朮川斷有火加阿膠黃芩無火加鹿角膠艾葉子腫身體腫而小便不利五皮飲加白朮子懸四物湯去川芎加茯苓白朮甘草按其證胸脘滿悶胎動不安子嗽二陳湯加桑皮阿膠麥冬五味乾薑細辛子瀉四君加砂仁黃芩或補中益氣湯臨產交骨不開宜芎歸加發灰龜板如血水大下而不產是血乾而胎滯氣虛推送無力也當歸補血湯加人參肉桂產後產後血暈用醋炭熏鼻酒和童便飲之不可臥倒如氣血脫而暈者必唇口手足厥冷當歸補血湯加參附淡姜以回陽胎衣不下當歸五錢川芎三錢水煎服如血入衣中脹而不下用陳酒送下失笑散產後發熱有外感者荊芥防風無外感當歸黃耆血塊痛俗名兒枕痛芎歸肉桂牛膝桃仁楂炭送下回生丹產後泄瀉不可利水用補中益氣湯產後大便不通宜八珍加桃仁杏仁子宮下垂乃勞力所傷也補中益氣加附子玉門不閉治同產後瘀血不行腹痛者宜生化湯川芎二錢當歸四錢桃仁七枚炙草一錢炮姜一錢水酒各半煎服產後痙口噤角弓反張無汗者名剛痙宜荊芥穗一兩童便煎服之或桂枝湯加葛根有汗為柔痙宜桂枝湯加花粉凡二種痙屬虛者以十全大補湯加鉤藤竹瀝薑汁汗多加附子產後喘口鼻起黑色為瘀血入肺不治或用人參一兩蘇木三錢水煎服若厥冷自汗必用通脈四逆湯厥回者可治經帶雜病婦人經水不調屬虛者衝任之血不足也宜歸脾湯二十劑加烏賊骨四兩茜草一兩以雀卵為小丸空心以鮑魚湯送下三錢如無雀卵以雞肝代之經水不調屬實者自有實證可憑宜四物湯加醋炒大黃香附桃仁丹皮青皮紅花經水不調因鬱而致者加味逍遙散婦人肥而不孕乃子宮脂滿宜芎歸芍香附半夏貝母益母膏為丸如瘦而不孕乃氣血兩虛宜八珍湯加菟絲杜仲鹿茸川椒婦人帶下多因中土虧損濕熱下陷帶脈失固宜六君子加炮姜更以補中益氣湯提之或以椿根皮黃柏白芍牡蠣醋糊丸以澀之
